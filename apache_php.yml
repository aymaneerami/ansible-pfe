---
- hosts: web_servers
  become: yes
  tasks:
       - name: "Step 1: Stop and Remove Nginx"
      apt:
        name: nginx
        state: absent
        purge: yes

       - name: "Step 2: Install Apache and PHP"
      apt:
        name: ['apache2', 'php', 'libapache2-mod-php']
        state: latest
        update_cache: yes

       - name: "Step 3: Create your PHP page"
      copy:
        dest: /var/www/html/index.php
        content: |
          <?php 
          echo "<h1>Hello Kolchi!</h1>";
          echo "<p>Running on server: " . gethostname() . "</p>"; 
          echo "<p>IP Address: " . $_SERVER['SERVER_ADDR'] . "</p>";
          ?>

       - name: "Step 4: Clean up default index"
      file:
        path: /var/www/html/index.html
        state: absent

       - name: "Step 5: Make sure Apache is Up"
      service:
        name: apache2
        state: started
        enabled: yes
